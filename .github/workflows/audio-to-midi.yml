name: Audio to MIDI Transcription

on:
  push:
    branches: [ main ]
    paths:
      - 'audio/**'          # Trigger only when audio files are added/changed
  workflow_dispatch:        # Allow manual trigger from GitHub UI
    inputs:
      file_path:
        description: 'Path to audio file in repo (e.g. audio/song.mp3)'
        required: true

jobs:
  transcribe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # or 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install basic-pitch soundfile  # soundfile often needed for I/O

      - name: Transcribe audio to MIDI
        env:
          # Use input if manual dispatch, else assume example file
          AUDIO_PATH: ${{ github.event.inputs.file_path || 'audio/example.mp3' }}
        run: |
          python -c "
          from basic_pitch.inference import predict_and_save
          predict_and_save(
              ['$AUDIO_PATH'],
              'output_midi/',
              save_midi=True,
              sonify_midi=False,
              save_model_outputs=False,
              save_notes=False,
          )
          "

      - name: Upload MIDI artifact
        uses: actions/upload-artifact@v4
        with:
          name: transcribed-midi
          path: output_midi/*.mid
          retention-days: 7

      # Optional: Commit the MIDI back to repo (careful with loops!)
      # - name: Commit MIDI files
      #   run: |
      #     git config user.name "GitHub Actions"
      #     git config user.email "actions@github.com"
      #     git add output_midi/*.mid
      #     git commit -m "Add transcribed MIDI files" || echo "No changes"
      #     git push
