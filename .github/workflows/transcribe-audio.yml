name: AI Audio → MIDI Transcription

on:
  push:
    branches: [main]
    paths:
      - 'audio/**'
  workflow_dispatch:
    inputs:
      audio_path:
        description: 'Path to single audio file (e.g. audio/my-song.mp3)'
        required: false
      mode:
        description: 'single or batch'
        required: false
        default: 'single'

jobs:
  transcribe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run transcription
        env:
          AUDIO_INPUT: ${{ github.event.inputs.audio_path || 'audio/*.mp3 audio/*.wav' }}
        run: |
          if [ "${{ github.event.inputs.mode || 'single' }}" = "batch" ]; then
            python scripts/batch_transcribe.py --input-dir audio --output-dir output_midi
          else
            python scripts/transcribe.py --input "${{ env.AUDIO_INPUT }}" --output-dir output_midi
          fi

      - name: Upload MIDI results
        uses: actions/upload-artifact@v4
        with:
          name: transcribed-midi-files
          path: output_midi/*.mid
          if-no-files-found: warn
          retention-days: 14
